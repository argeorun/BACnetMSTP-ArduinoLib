sentence=BACnet MS/TP server library for Arduino — RS-485 fieldbus connectivity.
paragraph=Implements a full BACnet MS/TP server over RS-485, based on the open-source bacnet-stack. Exposes Analog Value and Binary Value BACnet objects readable and writable by any BACnet client (YABE, NiagaraAX, etc.). EEPROM-backed configuration (MAC address, baud rate, device instance number) survives power cycles. Targets Arduino UNO, Mega 2560, STM32 (GenF1/F4), ESP32, ESP32-S3.
category=Communication
