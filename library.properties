sentence=BACnet MS/TP server library for Arduino - RS-485 fieldbus connectivity.
paragraph=Fully hardware-validated BACnet MS/TP server for Arduino. Supports Uno R3, Mega 2560, ESP32, ESP32-S3, STM32 Nucleo-144 F756ZG, and STM32 Blue Pill F103CB (compile-only, not yet hardware-tested). ReadProperty, WriteProperty, Who-Is/I-Am services. EEPROM-backed MAC address, baud rate, and device instance. Single include, 4-line sketch. Derived from https://github.com/argeorun/BACnet-MSTP-Arduino by the same author.
category=Communication
